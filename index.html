<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZINERA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f7f7f7;
}

header{
background:#000;
color:#d4af37;
padding:20px;
text-align:center;
font-size:40px;
font-weight:bold;
}

nav{
display:flex;
justify-content:center;
gap:25px;
background:white;
padding:15px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

nav a{
text-decoration:none;
color:black;
font-weight:bold;
}

.hero{
height:300px;
background:linear-gradient(135deg,#111,#444);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:42px;
}

.hero p{
margin-top:10px;
font-size:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h2{
padding:15px;
}

.price{
padding:0 15px;
font-size:22px;
color:#d4af37;
font-weight:bold;
}

button{
margin:15px;
width:calc(100% - 30px);
padding:12px;
background:#d4af37;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
}

footer{
margin-top:30px;
background:black;
color:white;
padding:20px;
text-align:center;
}
</style>

</head>
<body>

<header>AZINERA</header>

<nav>
<a href="#">💍 Bijuteriya</a>
<a href="#">👜 Çantalar</a>
<a href="#">👠 Ayaqqabılar</a>
</nav>

<section class="hero">
<h1>Yeni Kolleksiya</h1>
<p>Zövqlü Qadın Aksesuarları</p>
</section>

<section class="products">

<div class="card">
<img src="https://picsum.photos/400/400?1">
<h2>Boyunbağı</h2>
<div class="price">24 AZN</div>
<button>Səbətə əlavə et</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/400?2">
<h2>Qadın Çantası</h2>
<div class="price">69 AZN</div>
<button>Səbətə əlavə et</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/400?3">
<h2>Ayaqqabı</h2>
<div class="price">95 AZN</div>
<button>Səbətə əlavə et</button>
</div>

</section>

<footer>
© 2026 AZINERA
</footer>

</body>
</html>
